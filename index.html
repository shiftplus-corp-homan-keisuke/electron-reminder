<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <!--
      CSP ノート:
      - script-src 'unsafe-inline': Vite の HMR クライアントがインラインスクリプトを使用
      - connect-src ws://localhost:*: Vite HMR の WebSocket 接続を許可
      - 本番ビルドでは Electron の session.defaultSession.webRequest で CSP を上書き可能
    -->
    <meta http-equiv="Content-Security-Policy"
      content="default-src 'self';
               script-src 'self' 'unsafe-inline';
               style-src 'self' 'unsafe-inline';
               connect-src 'self' ws://localhost:* http://localhost:*;
               img-src 'self' data:;" />
    <title>Electron Reminder</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/renderer/index.tsx"></script>
  </body>
</html>
